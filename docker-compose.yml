services:
  # ── SQL Server ──────────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: saas_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd" # Change in production!
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -N -Q 'SELECT 1' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── .NET 8 API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: SaaSPlatform.Api/Dockerfile
    container_name: saas_api
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__Default: "Server=db,1433;Database=SaaSPlatformDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      Jwt__Issuer: "SaaSPlatform"
      Jwt__Audience: "SaaSPlatformUsers"
      Jwt__Key: "CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_IN_PRODUCTION_MIN_32_CHARS"

volumes:
  sqldata:
